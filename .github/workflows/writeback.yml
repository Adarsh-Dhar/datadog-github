name: DataHub PR Guardian writeback

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  writeback:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install action dependencies
        run: npm install --no-audit --no-fund
        working-directory: datahub-pr-guardian
      - name: Write merged review to DataHub
        run: node datahub-pr-guardian/src/writebackRunner.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATAHUB_GMS_URL: ${{ secrets.DATAHUB_GMS_URL }}
          DATAHUB_TOKEN: ${{ secrets.DATAHUB_TOKEN }}
          DATAHUB_PLATFORM: duckdb
          DATAHUB_ENV: PROD
          DATAHUB_DATASET_PREFIX: pr_guardian_demo.main
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
