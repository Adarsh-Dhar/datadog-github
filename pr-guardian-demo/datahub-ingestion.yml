# Run dbt parse (and dbt docs generate when a warehouse is available) first,
# then run: datahub ingest run -c datahub-ingestion.yml
source:
  type: dbt
  config:
    manifest_path: ./target/manifest.json
    catalog_path: ./target/catalog.json
    target_platform: duckdb
    env: PROD
    include_column_lineage: true

sink:
  type: datahub-rest
  config:
    server: http://localhost:8080
