name: DataHub PR Guardian writeback

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  writeback:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Adarsh-Dhar/datadog-github/datahub-pr-guardian@main
        with:
          mode: writeback
          datahub-gms-url: ${{ secrets.DATAHUB_GMS_URL }}
          datahub-token: ${{ secrets.DATAHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          datahub-platform: duckdb
          datahub-env: PROD
          datahub-dataset-prefix: pr_guardian_demo.main
